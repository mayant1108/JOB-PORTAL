services:
  - type: web
    name: job-portal-live
    runtime: node
    plan: free
    buildCommand: cd frontend/job-portal && npm ci && npm run build && cd ../../backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
